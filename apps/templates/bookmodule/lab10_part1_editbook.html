{% extends "layouts/base.html" %}
{% block title %} Edit Book {% endblock %}
{% block content %}
<h2>Edit Book</h2>
<form method="post">
    {% csrf_token %}
    <label>Title:</label><br/>
    <input type="text" name="title" value="{{ book.title }}" required/><br/><br/>

    <label>Price:</label><br/>
    <input type="number" step="0.01" name="price" value="{{ book.price }}" required/><br/><br/>

    <label>Quantity:</label><br/>
    <input type="number" name="quantity" value="{{ book.quantity }}" required/><br/><br/>

    <label>Publication Date:</label><br/>
    <input type="datetime-local" name="pubdate" value="{{ book.pubdate|date:'Y-m-d' }}T{{ book.pubdate|time:'H:i' }}" required/><br/><br/>

    <label>Rating (1-5):</label><br/>
    <input type="number" name="rating" min="1" max="5" value="{{ book.rating }}" required/><br/><br/>

    <button type="submit">Save Changes</button>
    <a href="{% url 'books.lab10_part1_listbooks' %}">Cancel</a>
</form>
{% endblock content %}
