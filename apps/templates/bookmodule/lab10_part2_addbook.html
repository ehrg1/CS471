{% extends "layouts/base.html" %}
{% block title %} Add Book (Part 2) {% endblock %}
{% block content %}
<h2>Add New Book (Django Form)</h2>
<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit">Add Book</button>
    <a href="{% url 'books.lab10_part2_listbooks' %}">Cancel</a>
</form>
{% endblock content %}
